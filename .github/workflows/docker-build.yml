name: Docker Build Push and Railway Redeploy

on:
  push:
    branches: [ main ]

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: ams-backend
            dockerfile: ./apps/backend/Dockerfile
            build-args: ""
            latest-tag: railway-fixed
          - name: frontend
            image: ams-frontend
            dockerfile: ./apps/frontend/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_BASE=${{ vars.NEXT_PUBLIC_API_BASE || 'https://ams-backend-production-fb77.up.railway.app' }}
            latest-tag: latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
        tags: |
          type=raw,value=${{ matrix.latest-tag }}
          type=sha,prefix=sha-

    - name: Build and push ${{ matrix.name }} image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        platforms: linux/amd64,linux/arm64
        push: true
        build-args: ${{ matrix.build-args }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ matrix.name }}
        cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  railway-redeploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.RAILWAY_TOKEN != '' }}
    steps:
    - name: Install Railway CLI
      run: npm install -g @railway/cli

    - name: Redeploy backend service
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        RAILWAY_SERVICE: ${{ secrets.RAILWAY_BACKEND_SERVICE }}
      run: |
        test -n "$RAILWAY_SERVICE"
        railway redeploy --service "$RAILWAY_SERVICE" --yes

    - name: Redeploy frontend service
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        RAILWAY_SERVICE: ${{ secrets.RAILWAY_FRONTEND_SERVICE }}
      run: |
        test -n "$RAILWAY_SERVICE"
        railway redeploy --service "$RAILWAY_SERVICE" --yes
